<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal page of Min Hsin Yu">
  <title>Min Hsin Yu — Personal Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <main class="container">
    <div class="card">
      <div class="avatar-ring">
        <div class="avatar">MY</div>
      </div>
      <h1 class="name">Min Hsin Yu</h1>
      <p class="tagline">Welcome to my personal page</p>
      <div class="divider"></div>
      <div class="clock-section">
        <span class="clock-label">Current Time</span>
        <div id="clock" class="clock">--:--:--</div>
        <div id="date" class="date">Loading…</div>
      </div>
    </div>
  </main>

  <script>
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
      const dateStr = now.toLocaleDateString('en-US', {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      });
      document.getElementById('clock').textContent = timeStr;
      document.getElementById('date').textContent = dateStr;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
